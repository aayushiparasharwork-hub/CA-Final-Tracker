<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --sidebar: #111827;
  --border: #E5E4E0;
  --text-1: #1A1917;

body { font-family: var(--ff-b); background: var(--bg); color: var(--text-1); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ── LAYOUT ── */

/* ── SIDEBAR ── */
.sidebar { width: 224px; background: var(--sidebar); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }

.sb-brand { padding: 22px 16px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }

.sb-title { font-family: var(--ff-d); font-size: 16px; font-weight: 700; color: #fff; }

.today-btn {
  display: flex; align-items: center; justify-content: space-between;
  margin: 10px 8px 4px;
  background: none; border: none; border-radius: 8px;
  padding: 9px 10px; cursor: pointer;
  transition: background .13s; width: calc(100% - 16px);
}
.today-btn:hover { background: rgba(255,255,255,.05); }
.today-btn.active { background: rgba(255,255,255,.1); }
.today-label { font-family: var(--ff-d); font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); }
.today-badge { font-family: var(--ff-m); font-size: 10px; background: #EF4444; color: #fff; border-radius: 4px; padding: 2px 6px; }

.sb-sep { height: 1px; background: rgba(255,255,255,.06); margin: 6px 8px; }
.sb-nav { flex: 1; padding: 4px 8px; }

.nav-btn { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; border-radius: 8px; padding: 9px 10px; margin-bottom: 2px; transition: background .13s; }
.nav-btn:hover { background: rgba(255,255,255,.05); }
.nav-btn.active { background: rgba(255,255,255,.1); }
.nb-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.nb-id { font-family: var(--ff-d); font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); }
.nb-ct { font-family: var(--ff-m); font-size: 10px; color: rgba(255,255,255,.3); }
.nb-bar { height: 2px; background: rgba(255,255,255,.07); border-radius: 1px; overflow: hidden; }
.nb-fill { height: 100%; border-radius: 1px; transition: width .4s ease; }
.nb-due { font-family: var(--ff-m); font-size: 9px; color: #FCA5A5; margin-top: 4px; }

.sb-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06); }

// ══════════════════════════════════════════════════
// SPACED REPETITION CONFIG
// ══════════════════════════════════════════════════
// Intervals (in days) per review count, indexed by difficulty
// diff 1 = easy, 2 = medium, 3 = hard
// Each array position = which review iteration you're on (0=first, 1=second, etc.)
const SR_INTERVALS = {
  0: [7, 14, 30, 60, 120],      // default (no difficulty set)
  1: [10, 20, 40, 80, 150],     // easy
  2: [5, 10, 21, 42, 90],       // medium
  3: [2, 5, 12, 25, 60],        // hard
};

function nextInterval(diff, reviewCount) {
  const seq = SR_INTERVALS[diff] || SR_INTERVALS[0];
  return seq[Math.min(reviewCount, seq.length - 1)];
}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
// Per chapter store:
// { status: 'unseen'|'studying'|'done',
//   studiedAt: ISO string (first time done),
//   diff: 0-3,
//   reviewCount: n,       ← how many times reviewed so far
//   nextReview: ISO string ← date of next scheduled review
// }

const VIEW_TODAY = '__TODAY__';
let activeSub = 'FR';
let store = {};

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function loadStore() {
  try {
    const raw = localStorage.getItem('ca_sr_v1');
    if (raw) {
      const p = JSON.parse(raw);
      store = p.d || {};
      activeSub = p.s || 'FR';
    }
  } catch(e) {}
}
function saveStore() {
  localStorage.setItem('ca_sr_v1', JSON.stringify({ d: store, s: activeSub }));
}

const key = (sid, i) => `${sid}_${i}`;
const get = (sid, i) => store[key(sid,i)] || { status:'unseen', studiedAt:null, diff:0, reviewCount:0, nextReview:null };
function set(sid, i, obj) { store[key(sid,i)] = { ...get(sid,i), ...obj }; saveStore(); }

// ══════════════════════════════════════════════════
// SPACED REP LOGIC
// ══════════════════════════════════════════════════
function addDays(from, d) {
  const dt = new Date(from); dt.setDate(dt.getDate() + d); return dt.toISOString();
}

function daysBetween(a, b) {
  // a, b are dates; returns b - a in days
  const da = new Date(a); da.setHours(0,0,0,0);
  const db = new Date(b); db.setHours(0,0,0,0);
  return Math.round((db - da) / 86400000);
}

function reviewStatus(ch) {
  // Returns: 'na' | 'due' | 'sched' | 'done'
  if (ch.status !== 'done' || !ch.nextReview) return 'na';
  const daysUntil = daysBetween(TODAY, new Date(ch.nextReview));
  if (daysUntil <= 0) return 'due';
  if (daysUntil <= 3) return 'sched'; // coming up soon
  return 'done'; // reviewed & scheduled far out
}

function markDone(sid, i) {
  const ch = get(sid, i);
  if (ch.status === 'done') return; // already done, use markReviewed
  const interval = nextInterval(ch.diff, 0);
  set(sid, i, {
    status: 'done',
    studiedAt: new Date().toISOString(),
    reviewCount: 0,
    nextReview: addDays(new Date(), interval),
  });
}

function markReviewed(sid, i) {
  const ch = get(sid, i);
  if (ch.status !== 'done') return;
  const rc = (ch.reviewCount || 0) + 1;
  const interval = nextInterval(ch.diff, rc);
  set(sid, i, {
    reviewCount: rc,
    nextReview: addDays(new Date(), interval),
  });
}

function cycleStatus(sid, i) {
  const ch = get(sid, i);
  if (ch.status === 'unseen')   { set(sid, i, { status: 'studying' }); }
  else if (ch.status === 'studying') { markDone(sid, i); }
  else if (ch.status === 'done') { set(sid, i, { status: 'unseen', studiedAt: null, reviewCount: 0, nextReview: null }); }
}

function setDiff(sid, i, d) {
  const ch = get(sid, i);
  const newDiff = ch.diff === d ? 0 : d;
  // Recalculate next review if already done
  let extra = {};
  if (ch.status === 'done' && ch.nextReview) {
    extra.nextReview = addDays(new Date(), nextInterval(newDiff, ch.reviewCount || 0));
  }
  set(sid, i, { diff: newDiff, ...extra });
}

// ══════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════
function getSubStats(sid) {
  const sub = SUBJECTS.find(s => s.id === sid);
  let done=0, studying=0, due=0, scheduled=0;
  sub.chapters.forEach((_,i) => {
    const ch = get(sid,i);
    const rs = reviewStatus(ch);
    if (ch.status === 'done')    done++;
    if (ch.status === 'studying') studying++;
    if (rs === 'due')   due++;
    if (rs === 'sched') scheduled++;
  });
  return { total: sub.chapters.length, done, studying, due, scheduled };
}

function getAllDue() {
  // Returns list of { sid, chIdx, chName, sub, reviewStatus, nextReview, diff }
  const items = [];
  SUBJECTS.forEach(sub => {
    sub.chapters.forEach((name, i) => {
      const ch = get(sub.id, i);
      const rs = reviewStatus(ch);
      if (rs === 'due' || rs === 'sched') {
        items.push({ sid: sub.id, chIdx: i, chName: name, sub, rs, ch });
      }
    });
  });
  // Sort: due first, then scheduled by date
  items.sort((a,b) => {
    if (a.rs === 'due' && b.rs !== 'due') return -1;
    if (b.rs === 'due' && a.rs !== 'due') return 1;
    return new Date(a.ch.nextReview) - new Date(b.ch.nextReview);
  });
  return items;
}

function getTotalDueCount() {
  return getAllDue().filter(x => x.rs === 'due').length;
}

// ══════════════════════════════════════════════════
// FORMAT HELPERS
// ══════════════════════════════════════════════════
function fmtAgo(iso) {
  if (!iso) return '';
  const d = daysBetween(new Date(iso), TODAY);
  if (d === 0) return 'today';
  if (d === 1) return 'yest.';
  if (d < 7)  return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function fmtNext(iso) {
  if (!iso) return '';
  const d = daysBetween(TODAY, new Date(iso));
  if (d <= 0) return 'Due now';
  if (d === 1) return 'Tomorrow';
  if (d <= 7) return `In ${d} days`;
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

  ${st.due ? `<div class="nb-due">↩ ${st.due} review${st.due>1?'s':''} due</div>` : ''}
</button>`;
  }).join('');

  const opct = tAll ? Math.round(tDone/tAll*100) : 0;
  const dueCount = getTotalDueCount();

  document.getElementById('sidebar').innerHTML = `
<div class="sb-brand">
  <div class="sb-eye">ICAI · New Scheme 2023</div>
  <div class="sb-title">CA Final Tracker</div>
</div>
<button class="today-btn ${activeSub===VIEW_TODAY?'active':''}" data-action="nav" data-sid="${VIEW_TODAY}">
  <span class="today-label">⚡ Due Today</span>
  ${dueCount ? `<span class="today-badge">${dueCount}</span>` : ''}
</button>
<div class="sb-sep"></div>
<nav class="sb-nav">${navItems}</nav>
<div class="sb-footer">
  <div class="ov-lbl">Overall</div>
  <div class="ov-row">
    <div class="ov-bar"><div class="ov-fill" style="width:${opct}%"></div></div>
    <span class="ov-pct">${opct}%</span>
  </div>
  <div class="ov-sub">${tDone} of ${tAll} chapters done</div>
</div>`;
}

function renderMain() {
  if (activeSub === VIEW_TODAY) { renderToday(); return; }
  const sub = SUBJECTS.find(s => s.id === activeSub);
  const st = getSubStats(activeSub);
  const pct = Math.round(st.done / st.total * 100);

  const chips = [
    st.done    ? `<span class="chip c-done">${st.done} Done</span>` : '',
    st.studying ? `<span class="chip c-study">${st.studying} Studying</span>` : '',
    st.due     ? `<span class="chip c-due">⚠ ${st.due} Review Due</span>` : '',
    st.scheduled ? `<span class="chip c-sched">${st.scheduled} Review Soon</span>` : '',
  ].filter(Boolean).join('');

  const rows = sub.chapters.map((name, i) => {
    const ch = get(sub.id, i);
    const rs = reviewStatus(ch);

    let statusCls, statusLbl;
    if (ch.status === 'unseen')   { statusCls='s-unseen'; statusLbl='○ Not Started'; }
    else if (ch.status === 'studying') { statusCls='s-study'; statusLbl='◑ Studying'; }
    else                                { statusCls='s-done';  statusLbl='● Done'; }

    let reviewCls, reviewLbl;
    if (rs === 'na')    { reviewCls='rb-na';   reviewLbl='—'; }
    else if (rs === 'due')   { reviewCls='rb-due';  reviewLbl='↩ Review Now'; }
    else if (rs === 'sched') { reviewCls='rb-sched'; reviewLbl=fmtNext(ch.nextReview); }
    else                     { reviewCls='rb-done';  reviewLbl=fmtNext(ch.nextReview); }

    const dots = [1,2,3].map(d =>
      `<button class="diff-dot ${ch.diff>=d?'on':'off'}" data-action="diff" data-sid="${sub.id}" data-i="${i}" data-d="${d}">${d}</button>`
    ).join('');

    const isDue = rs === 'due';
    const isDone = ch.status === 'done' && rs !== 'due';

    let subline = '';
    if (ch.studiedAt) {
      const rc = ch.reviewCount || 0;
      subline = `Studied ${fmtAgo(ch.studiedAt)}${rc > 0 ? ` · revised ${rc}×` : ''}`;
    }

    const reviewAction = (rs === 'due' || rs === 'sched') ? `data-action="review"` : '';
    const reviewClickable = (rs === 'due' || rs === 'sched') ? '' : 'style="pointer-events:none"';

    return `
<div class="ch-row ${isDue?'row-due':''} ${isDone?'row-done':''}">
  <div class="ch-name">
    <div class="ch-nm">${name}${isDue?'<span class="due-badge">Review Due</span>':''}</div>
    ${subline ? `<div class="ch-sub">${subline}</div>` : ''}
  </div>
  <button class="status-btn ${statusCls}" data-action="cycle" data-sid="${sub.id}" data-i="${i}"
    title="Click to cycle: Not Started → Studying → Done → (reset)">${statusLbl}</button>
  <button class="review-btn ${reviewCls}" ${reviewAction} data-sid="${sub.id}" data-i="${i}" ${reviewClickable}>${reviewLbl}</button>
  <div class="diff-col">${dots}</div>
</div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">${sub.name}</div>
      <div class="chips">${chips || '<span class="chip c-empty">Start clicking chapters below — no friction</span>'}</div>
    </div>
    <div class="header-right">
      <div class="hpct" style="color:${sub.color}">${pct}%</div>
      <div class="hpct-sub">${st.total} chapters</div>
    </div>
  </div>
  <div class="hbar"><div class="hbar-fill" style="width:${pct}%;background:${sub.color}"></div></div>
</div>
<div class="list-wrap">
  <div class="col-heads">
    <span class="col-n">Chapter</span>
    <span class="col-s">Status</span>
    <span class="col-r">Next Review</span>
    <span class="col-f">Difficulty</span>
  </div>
  ${rows}
</div>`;
}

function renderToday() {
  const items = getAllDue();
  const due   = items.filter(x => x.rs === 'due');
  const sched = items.filter(x => x.rs === 'sched');

  function itemRow(x) {
    const ch = x.ch;
    const rc = ch.reviewCount || 0;
    const isDue = x.rs === 'due';
    return `
<div class="ch-row ${isDue?'row-due':''}">
  <div class="ch-name">
    <div class="ch-nm">${x.chName}</div>
    <div class="ch-sub">
      <span class="today-sub-tag" style="background:${x.sub.color}18;color:${x.sub.color}">${x.sid}</span>
      ${rc > 0 ? `· revised ${rc}×` : ''}
    </div>
  </div>
  <button class="review-btn ${isDue?'rb-due':'rb-sched'}"
    data-action="review" data-sid="${x.sid}" data-i="${x.chIdx}">
    ${isDue ? '↩ Mark Reviewed' : fmtNext(ch.nextReview)}
  </button>
  <div class="diff-col">
    ${[1,2,3].map(d=>`<button class="diff-dot ${ch.diff>=d?'on':'off'}" data-action="diff" data-sid="${x.sid}" data-i="${x.chIdx}" data-d="${d}">${d}</button>`).join('')}
  </div>
</div>`;
  }

  const dueSection = due.length ? `
<div class="today-section">
  <div class="today-section-title">Overdue — do these first</div>
  ${due.map(itemRow).join('')}
</div>` : '';

  const schedSection = sched.length ? `
<div class="today-section">
  <div class="today-section-title">Coming up this week</div>
  ${sched.map(itemRow).join('')}
</div>` : '';

  const empty = !due.length && !sched.length ? `
<div class="today-empty">
  Nothing due. Keep studying new chapters.
</div>` : '';

  document.getElementById('main').innerHTML = `
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">Due Today</div>
      <div class="chips">
        ${due.length  ? `<span class="chip c-due">${due.length} Overdue</span>` : ''}
        ${sched.length? `<span class="chip c-sched">${sched.length} This Week</span>` : ''}
        ${!due.length && !sched.length ? '<span class="chip c-empty">All clear</span>' : ''}
      </div>
    </div>
    <div class="header-right">
      <div class="hpct" style="color:#EF4444">${due.length}</div>
      <div class="hpct-sub">overdue</div>
    </div>
  </div>
  <div class="hbar"><div class="hbar-fill" style="width:${Math.min(100,due.length*10)}%;background:#EF4444"></div></div>
</div>
<div class="list-wrap">
  ${dueSection}${schedSection}${empty}
</div>`;
}

function render() { renderSidebar(); renderMain(); }

// ══════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action, sid, i, d } = el.dataset;

  if (action === 'nav') {
    activeSub = sid;
    saveStore();
    render();
  } else if (action === 'cycle') {
    cycleStatus(sid, +i);
    render();
  } else if (action === 'review') {
    markReviewed(sid, +i);
    render();
  } else if (action === 'diff') {
    setDiff(sid, +i, +d);
    renderMain();
  }
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
loadStore();
render();
</script>
</body>
</html>
