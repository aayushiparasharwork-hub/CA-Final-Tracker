<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CA Final Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-6">

  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">CA Final Command Center</h1>

    <p class="text-zinc-400 mb-8">
      Track chapters. Revise smarter. Stay in control.
    </p>

    <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
      <h2 class="text-2xl font-semibold mb-6">
        Financial Reporting
      </h2>

      <div id="chapters" class="space-y-4"></div>
    </div>
  </div>

<script>
const chapters = [
  "Ind AS 1",
  "Ind AS 2",
  "Ind AS 7",
  "Ind AS 8",
  "Ind AS 16",
  "Ind AS 21",
  "Consolidation",
  "Business Combination",
  "Financial Instruments"
];

const container = document.getElementById("chapters");

let saved = JSON.parse(localStorage.getItem("caTracker")) || {};

chapters.forEach(chapter => {

  const completed = saved[chapter]?.completed || false;
  const revisions = saved[chapter]?.revisions || 0;

  const div = document.createElement("div");

  div.className =
    "bg-black border border-zinc-800 rounded-2xl p-4 flex justify-between items-center";

  div.innerHTML = `
    <div>
      <div class="flex items-center gap-3">
        <input
          type="checkbox"
          ${completed ? "checked" : ""}
          onchange="toggleComplete('${chapter}')"
        >

        <h3 class="text-lg font-semibold">
          ${chapter}
        </h3>
      </div>

      <p class="text-zinc-400 text-sm mt-2">
        Revisions:
        <span id="rev-${chapter}">
          ${revisions}
        </span>
      </p>
    </div>

    <button
      onclick="addRevision('${chapter}')"
      class="bg-white text-black px-4 py-2 rounded-xl font-medium"
    >
      + Revision
    </button>
  `;

  container.appendChild(div);
});

function toggleComplete(chapter) {

  saved[chapter] =
    saved[chapter] || {
      revisions: 0
    };

  saved[chapter].completed =
    !saved[chapter].completed;

  localStorage.setItem(
    "caTracker",
    JSON.stringify(saved)
  );
}

function addRevision(chapter) {

  saved[chapter] =
    saved[chapter] || {
      completed: false,
      revisions: 0
    };

  saved[chapter].revisions++;

  document.getElementById(
    `rev-${chapter}`
  ).innerText =
    saved[chapter].revisions;

  localStorage.setItem(
    "caTracker",
    JSON.stringify(saved)
  );
}
</script>

</body>
</html>
