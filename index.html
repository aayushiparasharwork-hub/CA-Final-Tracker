<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CA Final — Study Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3; --surface: #fff; --sidebar: #111827;
  --border: #E5E4E0; --text-1: #1A1917; --text-2: #6B6A67; --text-3: #A8A6A2;
  --ff-d: 'Syne', sans-serif; --ff-b: 'DM Sans', sans-serif; --ff-m: 'DM Mono', monospace;
}
body { font-family: var(--ff-b); background: var(--bg); color: var(--text-1); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

.layout { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar { width: 224px; background: var(--sidebar); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar::-webkit-scrollbar { width: 0; }
.sb-brand { padding: 22px 16px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
.sb-eye { font-family: var(--ff-m); font-size: 10px; letter-spacing: .13em; text-transform: uppercase; color: rgba(255,255,255,.28); margin-bottom: 4px; }
.sb-title { font-family: var(--ff-d); font-size: 16px; font-weight: 700; color: #fff; }

.today-btn { display: flex; align-items: center; justify-content: space-between; margin: 10px 8px 4px; background: none; border: none; border-radius: 8px; padding: 9px 10px; cursor: pointer; transition: background .13s; width: calc(100% - 16px); }
.today-btn:hover { background: rgba(255,255,255,.05); }
.today-btn.active { background: rgba(255,255,255,.1); }
.today-label { font-family: var(--ff-d); font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); }
.today-badge { font-family: var(--ff-m); font-size: 10px; background: #EF4444; color: #fff; border-radius: 4px; padding: 2px 6px; }

.sb-sep { height: 1px; background: rgba(255,255,255,.06); margin: 6px 8px; }
.sb-nav { flex: 1; padding: 4px 8px; }

.nav-btn { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; border-radius: 8px; padding: 9px 10px; margin-bottom: 2px; transition: background .13s; }
.nav-btn:hover { background: rgba(255,255,255,.05); }
.nav-btn.active { background: rgba(255,255,255,.1); }
.nb-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.nb-id { font-family: var(--ff-d); font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); }
.nb-ct font-family: var(--ff-m); font-size: 10px; color: rgba(255,255,255,.3); }
.nb-bar { height: 2px; background: rgba(255,255,255,.07); border-radius: 1px; overflow: hidden; }
.nb-fill { height: 100%; border-radius: 1px; transition: width .4s ease; }
.nb-due { font-family: var(--ff-m); font-size: 9px; color: #FCA5A5; margin-top: 4px; }

.sb-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06); }
.ov-lbl { font-family: var(--ff-m); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.28); margin-bottom: 7px; }
.ov-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.ov-bar { flex: 1; height: 2px; background: rgba(255,255,255,.08); border-radius: 1px; overflow: hidden; }
.ov-fill { height: 100%; background: rgba(255,255,255,.45); border-radius: 1px; transition: width .4s; }
.ov-pct { font-family: var(--ff-m); font-size: 11px; color: rgba(255,255,255,.4); }
.ov-sub { font-size: 11px; color: rgba(255,255,255,.22); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 28px; flex-shrink: 0; }
.header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.header-title { font-family: var(--ff-d); font-size: 19px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 10px; }
.chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip { font-size: 11.5px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.c-touched { background: #FFFBEB; color: #D97706; }
.c-due     { background: #FFF1F2; color: #E11D48; font-weight: 600; }
.c-sched   { background: #EFF6FF; color: #3B82F6; }
.c-empty   { background: #F5F5F4; color: #A8A6A2; }
.header-right { text-align: right; flex-shrink: 0; padding-left: 12px; }
.hpct { font-family: var(--ff-d); font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -.03em; }
.hpct-sub { font-family: var(--ff-m); font-size: 10px; color: var(--text-3); margin-top: 2px; }
.hbar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 1px; transition: width .5s ease; }

/* LIST */
.list-wrap { flex: 1; overflow-y: auto; padding: 16px 28px 40px; }
.list-wrap::-webkit-scrollbar { width: 3px; }
.list-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.09); border-radius: 2px; }
.col-heads { display: flex; align-items: center; gap: 6px; padding: 0 12px 8px; font-family: var(--ff-m); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); }
.col-n { flex: 1; }
.col-t { width: 116px; text-align: center; }
.col-r { width: 96px; text-align: center; }
.col-f { width: 64px; text-align: center; }

/* ROW */
.ch-row { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 4px; transition: border-color .13s, box-shadow .13s; }
.ch-row:hover { border-color: #D1D0CC; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.ch-row.row-due { border-color: #FCA5A5; background: #FFFAFA; }
.ch-row.row-touched { opacity: .75; }

.ch-name { flex: 1; min-width: 0; }
.ch-nm { font-size: 13px; font-weight: 500; line-height: 1.35; }
.ch-sub { font-family: var(--ff-m); font-size: 10.5px; color: var(--text-3); margin-top: 2px; }
.due-badge { display: inline-block; font-family: var(--ff-m); font-size: 9px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: #FFF1F2; color: #E11D48; padding: 1px 5px; border-radius: 3px; margin-left: 7px; vertical-align: middle; }

/* DATE LOG BUTTON */
.touch-btn { width: 116px; padding: 5px 7px; border-radius: 6px; font-size: 11.5px; font-weight: 500; font-family: var(--ff-b); border: 1px solid; cursor: pointer; text-align: center; transition: opacity .13s, transform .1s; flex-shrink: 0; }
.touch-btn:hover { opacity: .72; transform: scale(.97); }
.tb-new     { background: #F5F5F4; color: #78716C; border-color: #E5E4E0; }
.tb-active  { background: #FFFBEB; color: #D97706; border-color: #FDE68A; }
.tb-today   { background: #ECFDF5; color: #059669; border-color: #A7F3D0; }

/* REVIEW BTN */
.review-btn { width: 96px; padding: 5px 7px; border-radius: 6px; font-size: 11px; font-weight: 500; font-family: var(--ff-b); border: 1px solid; cursor: pointer; text-align: center; transition: opacity .13s, transform .1s; flex-shrink: 0; }
.review-btn:hover:not(.rb-na) { opacity: .72; transform: scale(.97); }
.rb-na    { background: #F5F5F4; color: #C5C3BF; border-color: #EFEEEB; cursor: default; pointer-events: none; }
.rb-due   { background: #FFF1F2; color: #E11D48; border-color: #FECDD3; font-weight: 600; }
.rb-sched { background: #EFF6FF; color: #3B82F6; border-color: #BFDBFE; cursor: default; pointer-events: none; }

/* DIFF DOTS */
.diff-col { width: 64px; display: flex; justify-content: center; gap: 3px; flex-shrink: 0; }
.diff-dot { width: 18px; height: 18px; border-radius: 4px; font-family: var(--ff-m); font-size: 9px; font-weight: 500; border: none; cursor: pointer; transition: all .13s; }
.diff-dot.on  { background: #1A1917; color: #fff; }
.diff-dot.off { background: #EFEEEB; color: #C5C3BF; }
.diff-dot:hover { opacity: .7; }

/* TODAY VIEW */
.today-section { margin-bottom: 22px; }
.today-section-title { font-family: var(--ff-m); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--text-3); margin-bottom: 8px; padding-left: 2px; }
.today-empty { padding: 40px 20px; text-align: center; font-size: 13px; color: var(--text-3); line-height: 1.7; }
.sub-tag { font-family: var(--ff-m); font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<script>
// ─────────────────────────────────────────────────
// SPACED REPETITION INTERVALS (days)
// diff 0=default, 1=easy, 2=medium, 3=hard
// index = reviewCount (0 = first scheduled review)
// ─────────────────────────────────────────────────
const SR = {
  0: [7,  14, 30,  60, 120],
  1: [10, 20, 40,  80, 150],
  2: [5,  10, 21,  42,  90],
  3: [2,   5, 12,  25,  60],
};
function srInterval(diff, rc) {
  const seq = SR[diff] || SR[0];
  return seq[Math.min(rc, seq.length - 1)];
}

// ─────────────────────────────────────────────────
// SUBJECTS + CHAPTERS
// ─────────────────────────────────────────────────
const SUBJECTS = [
  { id:'FR', name:'Financial Reporting', color:'#3B82F6', chapters:[
    'Conceptual Framework for Financial Reporting',
    'Ind AS 1 – Presentation of Financial Statements',
    'Ind AS 7 – Statement of Cash Flows',
    'Ind AS 8 – Accounting Policies, Changes in Estimates & Errors',
    'Ind AS 10 – Events after the Reporting Period',
    'Ind AS 12 – Income Taxes',
    'Ind AS 16 – Property, Plant & Equipment',
    'Ind AS 19 – Employee Benefits',
    'Ind AS 20 – Government Grants & Government Assistance',
    'Ind AS 21 – Effects of Changes in Foreign Exchange Rates',
    'Ind AS 23 – Borrowing Costs',
    'Ind AS 24 – Related Party Disclosures',
    'Ind AS 27 – Separate Financial Statements',
    'Ind AS 28 – Investments in Associates & Joint Ventures',
    'Ind AS 32 – Financial Instruments: Presentation',
    'Ind AS 33 – Earnings Per Share',
    'Ind AS 34 – Interim Financial Reporting',
    'Ind AS 36 – Impairment of Assets',
    'Ind AS 37 – Provisions, Contingent Liabilities & Contingent Assets',
    'Ind AS 38 – Intangible Assets',
    'Ind AS 40 – Investment Property',
    'Ind AS 41 – Agriculture',
    'Ind AS 101 – First-time Adoption of Ind AS',
    'Ind AS 102 – Share-based Payment',
    'Ind AS 103 – Business Combinations',
    'Ind AS 104 – Insurance Contracts',
    'Ind AS 105 – Non-current Assets Held for Sale & Discontinued Ops',
    'Ind AS 106 – Exploration for & Evaluation of Mineral Resources',
    'Ind AS 107 – Financial Instruments: Disclosures',
    'Ind AS 108 – Operating Segments',
    'Ind AS 109 – Financial Instruments (Recognition & Measurement)',
    'Ind AS 110 – Consolidated Financial Statements',
    'Ind AS 111 – Joint Arrangements',
    'Ind AS 112 – Disclosure of Interests in Other Entities',
    'Ind AS 113 – Fair Value Measurement',
    'Ind AS 115 – Revenue from Contracts with Customers',
    'Ind AS 116 – Leases',
    'Analysis of Financial Statements',
  ]},
  { id:'AFM', name:'Advanced Financial Management', color:'#8B5CF6', chapters:[
    'Financial Policy & Corporate Strategy','Risk Management','Security Analysis',
    'Security Valuation','Portfolio Management','Securitization','Mutual Funds',
    'Derivatives – Futures & Forwards','Derivatives – Options','Derivatives – Swaps',
    'Foreign Exchange Exposure & Risk Management','International Financial Management',
    'Interest Rate Risk Management','Business Valuation',
    'Mergers, Acquisitions & Corporate Restructuring','Startup Finance & Venture Capital',
  ]},
  { id:'AUDIT', name:'Advanced Auditing & Professional Ethics', color:'#10B981', chapters:[
    'Nature, Objective & Scope of Audit','Audit Strategy, Planning & Programming',
    'Risk Assessment & Internal Control','Audit Evidence',
    'Audit of Items of Financial Statements','The Company Audit','Audit Report',
    'Audit of Consolidated Financial Statements','Audit of Banks',
    'Audit of Insurance Companies','Audit of Non-banking Financial Companies',
    'Audit of Public Sector Undertakings','Internal Audit',
    'Due Diligence, Investigation & Forensic Audit','Peer Review & Quality Review',
    'Professional Ethics & Code of Conduct',
  ]},
  { id:'DT', name:'Direct Tax Laws & International Taxation', color:'#F97316', chapters:[
    'Basic Concepts & Residential Status','Income from Salaries',
    'Income from House Property','Profits & Gains from Business or Profession',
    'Capital Gains','Income from Other Sources','Clubbing of Income & Set Off of Losses',
    'Deductions under Chapter VI-A','Assessment of Individuals & HUF',
    'Assessment of Firms & LLP','Assessment of Companies',
    'Assessment of Co-operative Societies & AOP/BOI','TDS & TCS',
    'Advance Tax, Interest & Fee','Income Tax Authorities & Powers',
    'Assessment Procedures','Appeals, Revision & Settlement Commission',
    'Transfer Pricing','International Taxation & DTAA',
    'Black Money Act & Benami Transactions',
  ]},
  { id:'IDT', name:'Indirect Tax Laws', color:'#F43F5E', chapters:[
    'GST – Constitutional Background','GST – Levy & Collection','GST – Exemptions',
    'GST – Place of Supply','GST – Time of Supply','GST – Value of Supply',
    'GST – Input Tax Credit','GST – Registration','GST – Tax Invoice, Credit & Debit Notes',
    'GST – Returns','GST – Payment of Tax','GST – Refund','GST – Assessment',
    'GST – Audit','GST – Demand & Recovery','GST – Appeals & Revision',
    'GST – Offences & Penalties','Customs – Levy & Exemptions','Customs – Types of Duties',
    'Customs – Valuation','Customs – Import & Export Procedures','Customs – Warehousing',
    'Customs – Refund & Drawback','Foreign Trade Policy (FTP)',
  ]},
  { id:'IBS', name:'Integrated Business Solutions', color:'#14B8A6', chapters:[
    'Case Study Approach & Methodology','Strategic Management Application',
    'Financial Reporting in Case Context','Advanced Auditing & Assurance Application',
    'Direct Tax Planning Application','Indirect Tax Application',
    'Ethics & Professional Conduct','Mock Case Study – Set 1',
    'Mock Case Study – Set 2','Mock Case Study – Set 3',
  ]},
];

// ─────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────
const VIEW_TODAY = '__TODAY__';
let activeSub = 'FR';
let store = {};

function load() {
  try { const p = JSON.parse(localStorage.getItem('ca_sr_v2')||'{}'); store = p.d||{}; activeSub = p.s||'FR'; } catch(e){}
}
function save() { localStorage.setItem('ca_sr_v2', JSON.stringify({d:store,s:activeSub})); }

const K = (sid,i) => `${sid}_${i}`;
const G = (sid,i) => store[K(sid,i)] || { firstTouched:null, lastTouched:null, sessions:[], diff:0, reviewCount:0, nextReview:null };
function S(sid,i,obj) { store[K(sid,i)] = {...G(sid,i),...obj}; save(); }

// ─────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────
const today0 = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
function addDays(n) { const d=today0(); d.setDate(d.getDate()+n); return d.toISOString(); }
function daysSince(iso) {
  if (!iso) return null;
  const d = new Date(iso); d.setHours(0,0,0,0);
  return Math.round((today0()-d)/86400000);
}
function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso); d.setHours(0,0,0,0);
  return Math.round((d-today0())/86400000);
}
function fmtAgo(iso) {
  if (!iso) return '';
  const d = daysSince(iso);
  if (d===0) return 'today'; if (d===1) return 'yesterday';
  if (d<7) return d+'d ago';
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function fmtNext(iso) {
  if (!iso) return '—';
  const d = daysUntil(iso);
  if (d<=0) return 'Due now';
  if (d===1) return 'Tomorrow';
  if (d<=7) return 'In '+d+' days';
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function isTodayLogged(ch) {
  if (!ch.sessions || !ch.sessions.length) return false;
  return daysSince(ch.sessions[ch.sessions.length-1]) === 0;
}
function getTodayLabel() {
  return new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

// ─────────────────────────────────────────────────
// ACTIONS (WITH TOGGLE / UNDO LOGIC)
// ─────────────────────────────────────────────────
function logSession(sid, i) {
  const ch = G(sid,i);
  
  if (isTodayLogged(ch)) {
    // UNDO TOGGLE: User pressed button again today by mistake -> remove last session
    const sessions = [...(ch.sessions || [])];
    sessions.pop(); 

    if (sessions.length === 0) {
      // Revert completely to untouched state
      S(sid, i, {
        firstTouched: null,
        lastTouched: null,
        sessions: [],
        reviewCount: 0,
        nextReview: null
      });
    } else {
      // Revert back to the snapshot of previous logged state
      S(sid, i, { 
        lastTouched: sessions[sessions.length - 1], 
        sessions 
      });
    }
  } else {
    // STANDARD ACCUMULATION LOGIC
    const now = new Date().toISOString();
    const sessions = [...(ch.sessions||[]), now];

    if (!ch.firstTouched) {
      S(sid, i, {
        firstTouched: now,
        lastTouched:  now,
        sessions,
        reviewCount: 0,
        nextReview: addDays(srInterval(ch.diff, 0)),
      });
    } else {
      S(sid, i, { lastTouched: now, sessions });
    }
  }
}

function markReviewed(sid, i) {
  const ch = G(sid,i);
  if (!ch.nextReview) return;
  const rc = (ch.reviewCount||0) + 1;
  S(sid, i, { reviewCount: rc, nextReview: addDays(srInterval(ch.diff, rc)) });
}

function setDiff(sid, i, d) {
  const ch = G(sid,i);
  const diff = ch.diff===d ? 0 : d;
  const extra = ch.firstTouched ? { nextReview: addDays(srInterval(diff, ch.reviewCount||0)) } : {};
  S(sid, i, { diff, ...extra });
}

// ─────────────────────────────────────────────────
// DERIVED STATUS
// ─────────────────────────────────────────────────
function chStatus(ch) {
  if (!ch.firstTouched) return 'untouched';
  const du = daysUntil(ch.nextReview);
  if (du <= 0) return 'due';
  if (du <= 3) return 'soon';
  return 'active';
}

// ─────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────
function subStats(sid) {
  const sub = SUBJECTS.find(s=>s.id===sid);
  let touched=0, due=0, soon=0;
  sub.chapters.forEach((_,i) => {
    const ch = G(sid,i);
    const st = chStatus(ch);
    if (st!=='untouched') touched++;
    if (st==='due')  due++;
    if (st==='soon') soon++;
  });
  return { total:sub.chapters.length, touched, due, soon };
}

function allDue() {
  const items=[];
  SUBJECTS.forEach(sub => {
    sub.chapters.forEach((name,i) => {
      const ch = G(sub.id,i);
      const st = chStatus(ch);
      if (st==='due'||st==='soon') items.push({sid:sub.id,chIdx:i,chName:name,sub,st,ch});
    });
  });
  items.sort((a,b)=>{
    if(a.st==='due'&&b.st!=='due') return -1;
    if(b.st==='due'&&a.st!=='due') return 1;
    return new Date(a.ch.nextReview)-new Date(b.ch.nextReview);
  });
  return items;
}

// ─────────────────────────────────────────────────
// RENDER SIDEBAR
// ─────────────────────────────────────────────────
function renderSidebar() {
  let tTouched=0, tAll=0;
  const nav = SUBJECTS.map(sub=>{
    const st = subStats(sub.id);
    const pct = Math.round(st.touched/st.total*100);
    tTouched+=st.touched; tAll+=st.total;
    return `
<button class="nav-btn ${activeSub===sub.id?'active':''}" data-action="nav" data-sid="${sub.id}">
  <div class="nb-top"><span class="nb-id">${sub.id}</span><span class="nb-ct">${st.touched}/${st.total}</span></div>
  <div class="nb-bar"><div class="nb-fill" style="width:${pct}%;background:${sub.color}"></div></div>
  ${st.due?`<div class="nb-due">↩ ${st.due} review${st.due>1?'s':''} due</div>`:''}
</button>`;
  }).join('');

  const opct = tAll?Math.round(tTouched/tAll*100):0;
  const totalDue = allDue().filter(x=>x.st==='due').length;

  document.getElementById('sidebar').innerHTML=`
<div class="sb-brand">
  <div class="sb-eye">ICAI · New Scheme 2023</div>
  <div class="sb-title">CA Final Tracker</div>
</div>
<button class="today-btn ${activeSub===VIEW_TODAY?'active':''}" data-action="nav" data-sid="${VIEW_TODAY}">
  <span class="today-label">⚡ Due Today</span>
  ${totalDue?`<span class="today-badge">${totalDue}</span>`:''}
</button>
<div class="sb-sep"></div>
<nav class="sb-nav">${nav}</nav>
<div class="sb-footer">
  <div class="ov-lbl">Overall</div>
  <div class="ov-row">
    <div class="ov-bar"><div class="ov-fill" style="width:${opct}%"></div></div>
    <span class="ov-pct">${opct}%</span>
  </div>
  <div class="ov-sub">${tTouched} of ${tAll} chapters started</div>
</div>`;
}

// ─────────────────────────────────────────────────
// RENDER CHAPTER LIST
// ─────────────────────────────────────────────────
function renderMain() {
  if (activeSub===VIEW_TODAY) { renderToday(); return; }
  const sub = SUBJECTS.find(s=>s.id===activeSub);
  const st = subStats(activeSub);
  const pct = Math.round(st.touched/st.total*100);
  const dateStr = getTodayLabel();

  const chips=[
    st.touched?`<span class="chip c-touched">${st.touched} Started</span>`:'',
    st.due?`<span class="chip c-due">⚠ ${st.due} Review Due</span>`:'',
    st.soon?`<span class="chip c-sched">${st.soon} Review Soon</span>`:'',
  ].filter(Boolean).join('');

  const rows = sub.chapters.map((name,i)=>{
    const ch = G(sub.id,i);
    const st = chStatus(ch);
    const todayDone = isTodayLogged(ch);

    // Studied Today dynamic configurations
    let tbCls, tbLbl;
    if (!ch.firstTouched) { tbCls='tb-new';    tbLbl=`+ ${dateStr}`; }
    else if (todayDone)   { tbCls='tb-today';  tbLbl=`✓ ${dateStr}`; }
    else                  { tbCls='tb-active'; tbLbl=`+ ${dateStr}`; }

    // Review button
    let rbCls, rbLbl, rbAction='';
    if (!ch.firstTouched)  { rbCls='rb-na';    rbLbl='—'; }
    else if (st==='due')   { rbCls='rb-due';   rbLbl='↩ Mark Reviewed'; rbAction='data-action="review"'; }
    else if (st==='soon')  { rbCls='rb-sched'; rbLbl=fmtNext(ch.nextReview); }
    else                   { rbCls='rb-na';    rbLbl=fmtNext(ch.nextReview); }

    // Subline
    let subline='';
    if (ch.firstTouched) {
      const rc = ch.reviewCount||0;
      const sessions = ch.sessions?.length||1;
      subline = `First studied ${fmtAgo(ch.firstTouched)} · ${sessions} session${sessions!==1?'s':''}${rc>0?` · revised ${rc}×`:''}`;
    }

    const dots=[1,2,3].map(d=>
      `<button class="diff-dot ${ch.diff>=d?'on':'off'}" data-action="diff" data-sid="${sub.id}" data-i="${i}" data-d="${d}">${d}</button>`
    ).join('');

    return `
<div class="ch-row ${st==='due'?'row-due':''} ${ch.firstTouched&&st!=='due'?'row-touched':''}">
  <div class="ch-name">
    <div class="ch-nm">${name}${st==='due'?'<span class="due-badge">Review Due</span>':''}</div>
    ${subline?`<div class="ch-sub">${subline}</div>`:''}
  </div>
  <button class="touch-btn ${tbCls}" data-action="touch" data-sid="${sub.id}" data-i="${i}">${tbLbl}</button>
  <button class="review-btn ${rbCls}" ${rbAction} data-sid="${sub.id}" data-i="${i}">${rbLbl}</button>
  <div class="diff-col">${dots}</div>
</div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">${sub.name}</div>
      <div class="chips">${chips||`<span class="chip c-empty">Hit "+ ${dateStr}" on any chapter you touch</span>`}</div>
    </div>
    <div class="header-right">
      <div class="hpct" style="color:${sub.color}">${pct}%</div>
      <div class="hpct-sub">${st.total} chapters</div>
    </div>
  </div>
  <div class="hbar"><div class="hbar-fill" style="width:${pct}%;background:${sub.color}"></div></div>
</div>
<div class="list-wrap">
  <div class="col-heads">
    <span class="col-n">Chapter</span>
    <span class="col-t">Log Session</span>
    <span class="col-r">Next Review</span>
    <span class="col-f">Difficulty</span>
  </div>
  ${rows}
</div>`;
}

// ─────────────────────────────────────────────────
// RENDER TODAY VIEW
// ─────────────────────────────────────────────────
function renderToday() {
  const items = allDue();
  const due  = items.filter(x=>x.st==='due');
  const soon = items.filter(x=>x.st==='soon');
  const dateStr = getTodayLabel();

  function row(x) {
    const ch=x.ch; const isDue=x.st==='due';
    const todayDone=isTodayLogged(ch);
    return `
<div class="ch-row ${isDue?'row-due':''}">
  <div class="ch-name">
    <div class="ch-nm">${x.chName}</div>
    <div class="ch-sub">
      <span class="sub-tag" style="background:${x.sub.color}18;color:${x.sub.color}">${x.sid}</span>
      · ${(ch.reviewCount||0)>0?`revised ${ch.reviewCount}× · `:''}first studied ${fmtAgo(ch.firstTouched)}
    </div>
  </div>
  <button class="touch-btn ${todayDone?'tb-today':'tb-active'}" data-action="touch" data-sid="${x.sid}" data-i="${x.chIdx}">
    ${todayDone?`✓ ${dateStr}`:`+ ${dateStr}`}
  </button>
  ${isDue
    ? `<button class="review-btn rb-due" data-action="review" data-sid="${x.sid}" data-i="${x.chIdx}">↩ Mark Reviewed</button>`
    : `<button class="review-btn rb-sched" style="pointer-events:none">${fmtNext(ch.nextReview)}</button>`
  }
  <div class="diff-col">
    ${[1,2,3].map(d=>`<button class="diff-dot ${ch.diff>=d?'on':'off'}" data-action="diff" data-sid="${x.sid}" data-i="${x.chIdx}" data-d="${d}">${d}</button>`).join('')}
  </div>
</div>`;
  }

  const totalDue=due.length;
  document.getElementById('main').innerHTML=`
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">Due Today</div>
      <div class="chips">
        ${due.length?`<span class="chip c-due">⚠ ${due.length} Overdue</span>`:''}
        ${soon.length?`<span class="chip c-sched">${soon.length} This Week</span>`:''}
        ${!due.length&&!soon.length?'<span class="chip c-empty">All clear — go study new chapters</span>':''}
      </div>
    </div>
    <div class="header-right">
      <div class="hpct" style="color:#EF4444">${totalDue}</div>
      <div class="hpct-sub">overdue</div>
    </div>
  </div>
  <div class="hbar"><div class="hbar-fill" style="width:${Math.min(100,totalDue*8)}%;background:#EF4444"></div></div>
</div>
<div class="list-wrap">
  ${due.length?`<div class="today-section"><div class="today-section-title">Overdue — do these first</div>${due.map(row).join('')}</div>`:''}
  ${soon.length?`<div class="today-section"><div class="today-section-title">Coming up this week</div>${soon.map(row).join('')}</div>`:''}
  ${!due.length&&!soon.length?`<div class="today-empty">Nothing due right now.<br>Open any subject and log what you study today.</div>`:''}
</div>`;
}

// ─────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────
document.addEventListener('click', e=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const {action,sid,i,d}=el.dataset;
  if      (action==='nav')    { activeSub=sid; save(); }
  else if (action==='touch')  { logSession(sid,+i); }
  else if (action==='review') { markReviewed(sid,+i); }
  else if (action==='diff')   { setDiff(sid,+i,+d); renderMain(); return; }
  renderSidebar(); renderMain();
});

// ─────────────────────────────────────────────────
load(); renderSidebar(); renderMain();
</script>
</body>
</html>
